name: Deploy React App to GitHub Pages

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20   # or 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

     - name: Configure Git identity
  run: |
    git config --global user.email "alexcasimia@gmail.com"
    git config --global user.name "lexxakaatune"

- name: Deploy to GitHub Pages
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  run: |
    npx gh-pages -d dist \
      -u "github-actions-bot <github-actions-bot@users.noreply.github.com>" \
      -r https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
